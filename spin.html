<!DOCTYPE html><html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mystery Box</title>
<style>
body{
    font-family: Arial;
    text-align:center;
    background:linear-gradient(135deg,#ff9a9e,#fad0c4);
    margin:0;
}
h1{color:#fff;margin-top:20px}
.container{display:flex;justify-content:center;gap:20px;margin-top:40px}
.box{
    width:100px;height:100px;
    background:#fff;
    border-radius:12px;
    display:flex;align-items:center;justify-content:center;
    font-size:20px;font-weight:bold;
    cursor:pointer;
    transition:0.3s;
}
.box:hover{transform:scale(1.1)}
#result{margin-top:30px;font-size:22px;font-weight:bold;color:#fff}
button{margin-top:20px;padding:10px 20px;border:none;border-radius:8px;background:#ff4b2b;color:#fff}
</style>
</head>
<body><h1> Choose Your Mystery Box</h1><div id="adminPanel">
    <input type="number" id="setPoints" placeholder="Set Reward (1-20)">
    <button onclick="generateLink()">Generate Link</button>
    <p id="link"></p>
</div><div class="container">
    <div class="box" onclick="openBox(1)">A</div>
    <div class="box" onclick="openBox(2)">B</div>
    <div class="box" onclick="openBox(3)">C</div>
</div><div id="result"></div><script>
const SECRET="bbz@123";

function encode(points){
    return btoa(points+"-"+SECRET).replace(/=/g,"");
}

function decode(code){
    try{
        let d=atob(code);
        let [p,s]=d.split("-");
        if(s===SECRET) return parseInt(p);
    }catch{}
    return null;
}

function generateLink(){
    let p=document.getElementById("setPoints").value;
    if(p<1||p>20){alert("1-20 only");return}

    let code=encode(p);
    let link=window.location.origin+window.location.pathname+"?code="+code;

    document.getElementById("link").innerText=link;
}

let url=new URLSearchParams(window.location.search);
let code=url.get("code");
let reward=decode(code);

if(code){document.getElementById("adminPanel").style.display="none"}

function openBox(n){
    if(!reward){alert("Invalid link");return}

    if(localStorage.getItem("used_"+code)){
        alert("Already used");
        return;
    }

    document.getElementById("result").innerText=" You got "+reward+" points!";
    localStorage.setItem("used_"+code,true);
}
</script></body>
</html>
