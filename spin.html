<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Budget Bazar - Mystery Box</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@700;900&family=Rajdhani:wght@400;600;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}

:root{
  --gold:#f5c842;
  --gold2:#e8a800;
  --dark:#0a0a0f;
  --card:#13131f;
  --card2:#1c1c2e;
  --accent:#7c3aed;
  --glow:rgba(245,200,66,0.35);
}

body{
  font-family:'Rajdhani',sans-serif;
  background:var(--dark);
  color:#fff;
  min-height:100vh;
  overflow-x:hidden;
  position:relative;
}

/* Animated star background */
body::before{
  content:'';
  position:fixed;
  inset:0;
  background:
    radial-gradient(ellipse at 20% 20%, rgba(124,58,237,0.15) 0%, transparent 50%),
    radial-gradient(ellipse at 80% 80%, rgba(245,200,66,0.08) 0%, transparent 50%),
    radial-gradient(ellipse at 50% 50%, rgba(10,10,15,1) 0%, transparent 100%);
  z-index:0;
  pointer-events:none;
}

/* Particle stars */
.stars{position:fixed;inset:0;z-index:0;pointer-events:none;overflow:hidden}
.star{
  position:absolute;
  width:2px;height:2px;
  background:#fff;
  border-radius:50%;
  animation:twinkle var(--d,3s) ease-in-out infinite var(--delay,0s);
  opacity:0;
}
@keyframes twinkle{
  0%,100%{opacity:0;transform:scale(1)}
  50%{opacity:var(--op,0.8);transform:scale(1.5)}
}

/* Header */
header{
  position:relative;
  z-index:10;
  text-align:center;
  padding:28px 20px 10px;
}

.logo-wrap{
  display:inline-block;
  position:relative;
}
.logo-wrap::before{
  content:'';
  position:absolute;
  inset:-8px -20px;
  border:1px solid rgba(245,200,66,0.3);
  border-radius:4px;
}

h1{
  font-family:'Cinzel Decorative',serif;
  font-size:clamp(22px,6vw,38px);
  font-weight:900;
  background:linear-gradient(135deg,#f5c842,#fff4a0,#e8a800);
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
  background-clip:text;
  letter-spacing:2px;
  text-shadow:none;
  line-height:1.2;
}

.subtitle{
  font-size:13px;
  color:rgba(245,200,66,0.6);
  letter-spacing:4px;
  text-transform:uppercase;
  margin-top:4px;
}

/* Timer */
#timer{
  margin:18px auto 0;
  display:inline-block;
  background:rgba(245,200,66,0.08);
  border:1px solid rgba(245,200,66,0.25);
  border-radius:30px;
  padding:6px 22px;
  font-size:15px;
  font-weight:600;
  color:var(--gold);
  letter-spacing:1px;
}
#timer.urgent{
  border-color:rgba(255,80,80,0.6);
  color:#ff5050;
  background:rgba(255,80,80,0.08);
  animation:pulse-urgent 0.8s ease-in-out infinite;
}
@keyframes pulse-urgent{
  0%,100%{opacity:1}50%{opacity:0.6}
}

/* Admin Panel */
#adminPanel{
  position:relative;
  z-index:10;
  margin:20px auto;
  max-width:380px;
  background:var(--card);
  border:1px solid rgba(245,200,66,0.2);
  border-radius:16px;
  padding:20px;
}
#adminPanel h3{
  font-family:'Cinzel Decorative',serif;
  color:var(--gold);
  font-size:14px;
  letter-spacing:2px;
  margin-bottom:14px;
  text-align:center;
}
#adminPanel input{
  width:100%;
  background:rgba(255,255,255,0.05);
  border:1px solid rgba(245,200,66,0.3);
  border-radius:10px;
  padding:10px 16px;
  color:#fff;
  font-family:'Rajdhani',sans-serif;
  font-size:15px;
  outline:none;
  margin-bottom:12px;
  transition:border-color 0.3s;
}
#adminPanel input:focus{border-color:var(--gold)}
#adminPanel input::placeholder{color:rgba(255,255,255,0.3)}
#adminPanel button{
  width:100%;
  background:linear-gradient(135deg,var(--gold),var(--gold2));
  border:none;
  border-radius:10px;
  padding:11px;
  font-family:'Cinzel Decorative',serif;
  font-size:13px;
  font-weight:700;
  color:#0a0a0f;
  cursor:pointer;
  letter-spacing:1px;
  transition:transform 0.2s,box-shadow 0.2s;
  box-shadow:0 4px 20px rgba(245,200,66,0.3);
}
#adminPanel button:hover{transform:translateY(-2px);box-shadow:0 8px 28px rgba(245,200,66,0.5)}
#adminPanel button:active{transform:translateY(0)}
#link{
  margin-top:12px;
  font-size:11px;
  color:rgba(245,200,66,0.7);
  word-break:break-all;
  text-align:center;
  line-height:1.5;
}

/* Box Grid */
.container{
  position:relative;
  z-index:10;
  display:grid;
  grid-template-columns:repeat(2,1fr);
  gap:18px;
  padding:20px;
  max-width:440px;
  margin:0 auto;
}

/* Box Cards */
.box{
  aspect-ratio:1;
  perspective:1000px;
  cursor:pointer;
}
.inner{
  width:100%;
  height:100%;
  position:relative;
  transform-style:preserve-3d;
  transition:transform 0.7s cubic-bezier(0.4,0,0.2,1);
}
.inner.flip{transform:rotateY(180deg)}

.face{
  position:absolute;
  inset:0;
  border-radius:20px;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  backface-visibility:hidden;
  -webkit-backface-visibility:hidden;
}

.front{
  background:linear-gradient(145deg,var(--card2),#0e0e1a);
  border:1px solid rgba(245,200,66,0.25);
  box-shadow:0 0 30px rgba(124,58,237,0.15), inset 0 1px 0 rgba(255,255,255,0.05);
  overflow:hidden;
}
.front::before{
  content:'';
  position:absolute;
  inset:0;
  background:
    repeating-linear-gradient(45deg,transparent,transparent 20px,rgba(245,200,66,0.015) 20px,rgba(245,200,66,0.015) 21px);
}
.front::after{
  content:'';
  position:absolute;
  top:-50%;left:-50%;
  width:200%;height:200%;
  background:conic-gradient(transparent 0deg,rgba(245,200,66,0.04) 60deg,transparent 120deg);
  animation:spin 8s linear infinite;
}
@keyframes spin{to{transform:rotate(360deg)}}

.box-icon{font-size:52px;position:relative;z-index:1;animation:float 3s ease-in-out infinite}
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-6px)}}
.box-label{
  font-size:11px;
  letter-spacing:3px;
  color:rgba(245,200,66,0.5);
  text-transform:uppercase;
  margin-top:6px;
  position:relative;
  z-index:1;
}

/* Hover glow */
.box:hover .front{
  border-color:rgba(245,200,66,0.6);
  box-shadow:0 0 40px rgba(245,200,66,0.2), inset 0 1px 0 rgba(255,255,255,0.08);
}
.box:hover .box-icon{animation:bounce 0.6s ease-in-out}
@keyframes bounce{0%,100%{transform:scale(1)}40%{transform:scale(1.2)}60%{transform:scale(0.95)}}

.back{
  background:linear-gradient(145deg,#1a1025,#0f0f1c);
  border:1px solid rgba(245,200,66,0.5);
  transform:rotateY(180deg);
  box-shadow:0 0 50px rgba(245,200,66,0.25);
}
.points-number{
  font-family:'Cinzel Decorative',serif;
  font-size:52px;
  font-weight:900;
  background:linear-gradient(135deg,#f5c842,#fff4a0);
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
  background-clip:text;
  line-height:1;
}
.points-label{
  font-size:12px;
  letter-spacing:3px;
  color:rgba(245,200,66,0.6);
  text-transform:uppercase;
  margin-top:4px;
}

/* Result */
#result{
  position:relative;
  z-index:10;
  text-align:center;
  margin:10px 20px 30px;
  min-height:60px;
}
.result-inner{
  display:inline-block;
  background:linear-gradient(135deg,rgba(245,200,66,0.1),rgba(245,200,66,0.05));
  border:1px solid rgba(245,200,66,0.4);
  border-radius:16px;
  padding:14px 28px;
  opacity:0;
  transform:translateY(10px);
  transition:all 0.5s cubic-bezier(0.4,0,0.2,1);
}
.result-inner.show{opacity:1;transform:translateY(0)}
.result-emoji{font-size:28px}
.result-text{
  font-family:'Cinzel Decorative',serif;
  font-size:16px;
  color:var(--gold);
  margin-top:4px;
}
.result-sub{font-size:13px;color:rgba(255,255,255,0.5);margin-top:2px}

/* Confetti particles */
.confetti-particle{
  position:fixed;
  width:8px;height:8px;
  top:-10px;
  border-radius:2px;
  animation:confetti-fall var(--dur,2.5s) ease-in forwards;
  z-index:999;
  pointer-events:none;
}
@keyframes confetti-fall{
  0%{transform:translateY(0) rotate(0deg) scale(1);opacity:1}
  80%{opacity:1}
  100%{transform:translateY(105vh) rotate(720deg) scale(0.5);opacity:0}
}

/* Shimmer on boxes when shuffling */
.shuffle-active .front{
  animation:shimmer 0.3s ease-in-out infinite alternate;
}
@keyframes shimmer{
  from{border-color:rgba(245,200,66,0.2)}
  to{border-color:rgba(245,200,66,0.7)}
}
</style>
</head>
<body>

<div class="stars" id="stars"></div>

<header>
  <div class="logo-wrap">
    <h1>Budget Bazar</h1>
  </div>
  <div class="subtitle">Mystery Reward Box</div>
  <div id="timer" style="display:none"></div>
</header>

<div id="adminPanel">
  <h3>&#9670; Admin Panel &#9670;</h3>
  <input type="number" id="setPoints" placeholder="Set Base Points (1 - 20)" min="1" max="20">
  <button onclick="generateLink()">&#10024; Generate Magic Link</button>
  <p id="link"></p>
</div>

<div class="container" id="boxContainer">
  <div class="box" onclick="openBox(0)">
    <div class="inner" id="inner0">
      <div class="face front"><div class="box-icon">&#127873;</div><div class="box-label">Tap to Open</div></div>
      <div class="face back"><div class="points-number" id="pts0">?</div><div class="points-label">Points</div></div>
    </div>
  </div>
  <div class="box" onclick="openBox(1)">
    <div class="inner" id="inner1">
      <div class="face front"><div class="box-icon">&#127873;</div><div class="box-label">Tap to Open</div></div>
      <div class="face back"><div class="points-number" id="pts1">?</div><div class="points-label">Points</div></div>
    </div>
  </div>
  <div class="box" onclick="openBox(2)">
    <div class="inner" id="inner2">
      <div class="face front"><div class="box-icon">&#127873;</div><div class="box-label">Tap to Open</div></div>
      <div class="face back"><div class="points-number" id="pts2">?</div><div class="points-label">Points</div></div>
    </div>
  </div>
  <div class="box" onclick="openBox(3)">
    <div class="inner" id="inner3">
      <div class="face front"><div class="box-icon">&#127873;</div><div class="box-label">Tap to Open</div></div>
      <div class="face back"><div class="points-number" id="pts3">?</div><div class="points-label">Points</div></div>
    </div>
  </div>
</div>

<div id="result">
  <div class="result-inner" id="resultInner">
    <div class="result-emoji">&#127881;</div>
    <div class="result-text" id="resultText"></div>
    <div class="result-sub">Claim your reward at Budget Bazar!</div>
  </div>
</div>

<script>
// ---- Star background ----
(function(){
  var s=document.getElementById("stars");
  for(var i=0;i<80;i++){
    var el=document.createElement("div");
    el.className="star";
    el.style.left=Math.random()*100+"vw";
    el.style.top=Math.random()*100+"vh";
    el.style.setProperty("--d",(2+Math.random()*4)+"s");
    el.style.setProperty("--delay",(-Math.random()*4)+"s");
    el.style.setProperty("--op",0.3+Math.random()*0.7);
    s.appendChild(el);
  }
})();

// ---- Core Logic ----
var SECRET="bbz@pro";
var EXPIRY_TIME=60000;

function encode(p){
  return btoa(p+"-"+SECRET+"-"+Date.now()).replace(/=/g,"");
}
function decode(c){
  try{
    var d=atob(c).split("-");
    if(d[1]===SECRET){
      if(Date.now()-parseInt(d[2])>EXPIRY_TIME)return "expired";
      return parseInt(d[0]);
    }
  }catch(e){}
  return null;
}

function generateLink(){
  var p=parseInt(document.getElementById("setPoints").value);
  if(!p||p<1||p>20){alert("1 se 20 ke beech points daalo");return;}
  var code=encode(p);
  var link=location.origin+location.pathname+"?code="+code;
  document.getElementById("link").innerText=link;
}

var url=new URLSearchParams(location.search);
var code=url.get("code");
var base=decode(code);

if(code){
  document.getElementById("adminPanel").style.display="none";
}

// ---- Timer ----
if(base && base!=="expired"){
  document.getElementById("timer").style.display="inline-block";
  var startTime=parseInt(atob(code).split("-")[2]);
  var endTime=startTime+EXPIRY_TIME;
  var timerEl=document.getElementById("timer");
  var timerInterval=setInterval(function(){
    var left=endTime-Date.now();
    if(left<=0){
      timerEl.innerText="Offer Expired";
      timerEl.className="urgent";
      clearInterval(timerInterval);
      return;
    }
    var secs=Math.ceil(left/1000);
    timerEl.innerText="Offer ends in "+secs+"s";
    if(secs<=10)timerEl.className="urgent";
  },400);
}

// ---- Set box values ----
var vals=[0,1,2,3];
if(base && base!=="expired"){
  var raw=[base, base-2, base-3, base+5];
  vals=raw.map(function(v){return v<1?1:v>20?20:v;});
  for(var i=0;i<4;i++){
    document.getElementById("pts"+i).innerText=vals[i];
  }
  setTimeout(function(){startShuffle();},800);
}

// ---- Shuffle Animation ----
var shuffling=false;
function startShuffle(){
  shuffling=true;
  var container=document.getElementById("boxContainer");
  container.classList.add("shuffle-active");
  var boxes=document.querySelectorAll(".box");
  var t=Date.now();
  var speed=1;

  // Web Audio for shuffle sound
  playTick();
  var tickInt=setInterval(playTick,200);

  function move(){
    var p=Date.now()-t;
    var progress=p/3000;
    speed=1+progress*2;
    boxes.forEach(function(b,i){
      var x=Math.sin(p/180*speed+i*1.5)*18;
      var y=Math.cos(p/220*speed+i*1.2)*18;
      var r=Math.sin(p/400+i)*4;
      b.style.transform="translate("+x+"px,"+y+"px) rotate("+r+"deg)";
    });
    if(p<3000){
      requestAnimationFrame(move);
    } else {
      boxes.forEach(function(b){b.style.transform="";});
      container.classList.remove("shuffle-active");
      clearInterval(tickInt);
      shuffling=false;
    }
  }
  move();
}

// ---- Web Audio ----
var audioCtx=null;
function getAudio(){
  if(!audioCtx)audioCtx=new(window.AudioContext||window.webkitAudioContext)();
  return audioCtx;
}
function playTick(){
  try{
    var ctx=getAudio();
    var osc=ctx.createOscillator();
    var gain=ctx.createGain();
    osc.connect(gain);
    gain.connect(ctx.destination);
    osc.type="sine";
    osc.frequency.value=800+Math.random()*400;
    gain.gain.setValueAtTime(0.12,ctx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001,ctx.currentTime+0.08);
    osc.start(ctx.currentTime);
    osc.stop(ctx.currentTime+0.08);
  }catch(e){}
}
function playReveal(){
  try{
    var ctx=getAudio();
    var notes=[523,659,784,1047];
    notes.forEach(function(freq,i){
      var osc=ctx.createOscillator();
      var gain=ctx.createGain();
      osc.connect(gain);
      gain.connect(ctx.destination);
      osc.type="triangle";
      osc.frequency.value=freq;
      var t=ctx.currentTime+i*0.12;
      gain.gain.setValueAtTime(0,t);
      gain.gain.linearRampToValueAtTime(0.18,t+0.05);
      gain.gain.exponentialRampToValueAtTime(0.001,t+0.3);
      osc.start(t);
      osc.stop(t+0.3);
    });
  }catch(e){}
}

// ---- Open Box ----
var opened=false;
function openBox(i){
  if(shuffling){return;}
  if(!base||base==="expired"){alert("Link expired hai!");return;}
  if(localStorage.getItem("used_"+code)){alert("Ye reward already use ho chuka hai!");return;}
  if(opened)return;
  opened=true;

  document.getElementById("inner"+i).classList.add("flip");
  playReveal();

  setTimeout(function(){
    confettiBurst();
    var resultInner=document.getElementById("resultInner");
    document.getElementById("resultText").innerText="You won "+vals[i]+" Points!";
    resultInner.classList.add("show");
    localStorage.setItem("used_"+code,true);
  },600);
}

// ---- Confetti ----
function confettiBurst(){
  var colors=["#f5c842","#7c3aed","#ff6b6b","#4ecdc4","#fff4a0","#ff9f43","#a29bfe"];
  for(var i=0;i<60;i++){
    var el=document.createElement("div");
    el.className="confetti-particle";
    el.style.left=Math.random()*100+"vw";
    el.style.background=colors[Math.floor(Math.random()*colors.length)];
    el.style.setProperty("--dur",(1.5+Math.random()*2)+"s");
    el.style.transform="rotate("+Math.random()*360+"deg)";
    el.style.width=(5+Math.random()*8)+"px";
    el.style.height=(5+Math.random()*8)+"px";
    el.style.borderRadius=Math.random()>0.5?"50%":"2px";
    document.body.appendChild(el);
    setTimeout(function(e){e.remove();},3500,el);
  }
}
</script>
</body>
</html>
