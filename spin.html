<!DOCTYPE html><html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mystery Boxes Pro</title>
<style>
body{font-family:Arial;text-align:center;margin:0;background:linear-gradient(135deg,#667eea,#764ba2);color:#fff}
h1{margin-top:20px}.container{ display:grid; grid-template-columns:repeat(2,1fr); gap:20px; padding:20px; max-width:500px; margin:auto; }

.box{ width:100%; height:150px; background:#fff; color:#333; border-radius:16px; display:flex; align-items:center; justify-content:center; font-size:22px; font-weight:bold; cursor:pointer; transition:.3s; }

.box:hover{transform:scale(1.05)} .hidden{background:#ff4b2b;color:#fff}

#result{margin-top:20px;font-size:24px;font-weight:bold} button{margin-top:15px;padding:10px 20px;border:none;border-radius:8px;background:#ff4b2b;color:#fff} #adminPanel{margin-top:20px}

.shuffle{ animation: shuffleMove 0.5s ease-in-out infinite alternate; }

@keyframes shuffleMove{ 0%{transform:translateY(0)} 100%{transform:translateY(-10px)} } </style>

</head>
<body><h1>🎁 Choose Your Mystery Box</h1><div id="adminPanel">
<input type="number" id="setPoints" placeholder="Set Base Points (1-20)">
<button onclick="generateLink()">Generate Link</button>
<p id="link"></p>
</div><div class="container" id="boxContainer">
<div class="box" onclick="openBox(0)"></div>
<div class="box" onclick="openBox(1)"></div>
<div class="box" onclick="openBox(2)"></div>
<div class="box" onclick="openBox(3)"></div>
</div><div id="result"></div><audio id="shuffleSound" src="https://www.soundjay.com/button/beep-07.wav"></audio>

<script>
const SECRET="bbz@pro";

function encode(p){return btoa(p+"-"+SECRET).replace(/=/g,"")}
function decode(c){try{let d=atob(c);let [p,s]=d.split("-");if(s===SECRET)return parseInt(p)}catch{}return null}

function generateLink(){
 let p=parseInt(document.getElementById("setPoints").value);
 if(p<1||p>20){alert("1-20 only");return}
 let code=encode(p);
 let link=window.location.origin+window.location.pathname+"?code="+code;
 document.getElementById("link").innerText=link;
}

let url=new URLSearchParams(window.location.search);
let code=url.get("code");
let base=decode(code);

if(code){document.getElementById("adminPanel").style.display="none"}

let boxes=document.querySelectorAll(".box");
let container=document.getElementById("boxContainer");
let sound=document.getElementById("shuffleSound");
let values=[];

if(base){
 values=[base, base-2, base-3, base+5];
 values=values.map(v=>v<1?1:v>20?20:v);

 boxes.forEach((b,i)=>{b.innerText=values[i]});

 setTimeout(()=>{
   boxes.forEach(b=>{b.innerText="🎁";b.classList.add("hidden")});
   startShuffle();
 },1500);
}

function startShuffle(){
 sound.play();
 boxes.forEach(b=>b.classList.add("shuffle"));

 let interval=setInterval(()=>{
   let arr=[...boxes];
   arr.sort(()=>Math.random()-0.5);
   arr.forEach(el=>container.appendChild(el));
 },400);

 setTimeout(()=>{
   clearInterval(interval);
   boxes.forEach(b=>b.classList.remove("shuffle"));
 },3000);
}

function openBox(i){
 if(!base){alert("Invalid link");return}
 if(localStorage.getItem("used_"+code)){alert("Already used");return}

 document.getElementById("result").innerText="🎉 You got "+base+" points!";

 boxes[i].innerText=base;
 boxes[i].style.background="#00c853";
 boxes[i].style.color="#fff";
 boxes[i].style.transform="scale(1.2)";

 localStorage.setItem("used_"+code,true);
}
</script></body>
</html>
