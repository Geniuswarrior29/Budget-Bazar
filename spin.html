<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Budget Bazar - Mystery Box</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@700;900&family=Rajdhani:wght@400;600;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--gold:#f5c842;--gold2:#e8a800;--dark:#0a0a0f;--card:#13131f;--card2:#1c1c2e;}
body{font-family:'Rajdhani',sans-serif;background:var(--dark);color:#fff;min-height:100vh;overflow-x:hidden;position:relative;}
body::before{content:'';position:fixed;inset:0;background:radial-gradient(ellipse at 20% 20%,rgba(124,58,237,0.18) 0%,transparent 50%),radial-gradient(ellipse at 80% 80%,rgba(245,200,66,0.10) 0%,transparent 50%);z-index:0;pointer-events:none;}
.stars{position:fixed;inset:0;z-index:0;pointer-events:none;overflow:hidden}
.star{position:absolute;width:2px;height:2px;background:#fff;border-radius:50%;animation:twinkle var(--d,3s) ease-in-out infinite var(--delay,0s);opacity:0;}
@keyframes twinkle{0%,100%{opacity:0}50%{opacity:var(--op,0.8)}}

header{position:relative;z-index:10;text-align:center;padding:28px 20px 8px;}
.logo-wrap{display:inline-block;position:relative;}
.logo-wrap::before{content:'';position:absolute;inset:-8px -20px;border:1px solid rgba(245,200,66,0.3);border-radius:4px;}
h1{font-family:'Cinzel Decorative',serif;font-size:clamp(20px,6vw,36px);font-weight:900;background:linear-gradient(135deg,#f5c842,#fff4a0,#e8a800);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;letter-spacing:2px;line-height:1.2;}
.subtitle{font-size:11px;color:rgba(245,200,66,0.55);letter-spacing:5px;text-transform:uppercase;margin-top:5px;}
#timer{margin:14px auto 0;display:none;background:rgba(245,200,66,0.08);border:1px solid rgba(245,200,66,0.25);border-radius:30px;padding:6px 22px;font-size:15px;font-weight:600;color:var(--gold);letter-spacing:1px;}
#timer.urgent{border-color:rgba(255,80,80,0.6);color:#ff5050;background:rgba(255,80,80,0.08);animation:pu 0.8s ease-in-out infinite;}
@keyframes pu{0%,100%{opacity:1}50%{opacity:0.6}}

/* ── ADMIN ── */
#adminPanel{position:relative;z-index:10;margin:18px auto;max-width:400px;background:var(--card);border:1px solid rgba(245,200,66,0.22);border-radius:18px;padding:20px 18px;}
#adminPanel h3{font-family:'Cinzel Decorative',serif;color:var(--gold);font-size:12px;letter-spacing:3px;margin-bottom:16px;text-align:center;}
.slabel{font-size:10px;letter-spacing:2px;color:rgba(245,200,66,0.5);text-transform:uppercase;margin-bottom:8px;margin-top:14px;}
.box-row{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:4px;}
.bcfg{background:rgba(255,255,255,0.03);border:1px solid rgba(245,200,66,0.12);border-radius:10px;padding:10px;}
.bcfg-t{font-size:10px;letter-spacing:2px;color:rgba(245,200,66,0.5);text-transform:uppercase;margin-bottom:7px;font-weight:700;}
.bcfg input{width:100%;background:rgba(255,255,255,0.05);border:1px solid rgba(245,200,66,0.2);border-radius:7px;padding:7px 10px;color:#fff;font-family:'Rajdhani',sans-serif;font-size:13px;outline:none;margin-bottom:6px;transition:border-color 0.2s;}
.bcfg input:last-child{margin-bottom:0;}
.bcfg input:focus{border-color:var(--gold)}
.bcfg input::placeholder{color:rgba(255,255,255,0.22);font-size:11px;}
.win-select{display:grid;grid-template-columns:repeat(4,1fr);gap:6px;margin-top:4px;}
.wb{background:rgba(255,255,255,0.04);border:1px solid rgba(245,200,66,0.2);border-radius:8px;padding:8px 4px;color:rgba(255,255,255,0.5);font-family:'Rajdhani',sans-serif;font-size:12px;font-weight:600;cursor:pointer;transition:all 0.2s;letter-spacing:1px;}
.wb.active{background:rgba(245,200,66,0.18);border-color:var(--gold);color:var(--gold);}
.gen-btn{width:100%;background:linear-gradient(135deg,var(--gold),var(--gold2));border:none;border-radius:10px;padding:12px;font-family:'Cinzel Decorative',serif;font-size:12px;font-weight:700;color:#0a0a0f;cursor:pointer;letter-spacing:1px;transition:transform 0.2s,box-shadow 0.2s;box-shadow:0 4px 20px rgba(245,200,66,0.3);margin-top:14px;display:block;}
.gen-btn:hover{transform:translateY(-2px);box-shadow:0 8px 28px rgba(245,200,66,0.5)}
#link{margin-top:10px;font-size:11px;color:rgba(245,200,66,0.7);word-break:break-all;text-align:center;line-height:1.6;}

/* ── SHUFFLE HINT ── */
#shuffleHint{position:relative;z-index:10;text-align:center;margin:8px 0 0;font-size:12px;letter-spacing:2px;color:rgba(245,200,66,0.5);text-transform:uppercase;min-height:20px;transition:opacity 0.4s;}

/* ── BOXES ── */
.container{position:relative;z-index:10;display:grid;grid-template-columns:repeat(2,1fr);gap:18px;padding:18px 20px;max-width:440px;margin:0 auto;}

.box{aspect-ratio:1;perspective:1000px;cursor:pointer;transition:transform 0.18s;}
.box.not-winning{cursor:default;pointer-events:none;}

/* shuffle wobble — now via JS class */
.box.shuffle-me{animation:shuffleBox 0.38s ease-in-out infinite alternate;}
@keyframes shuffleBox{
  0%  {transform:translate(-10px,-8px) rotate(-4deg) scale(1.04);}
  25% {transform:translate(12px,-5px) rotate(3deg) scale(0.97);}
  50% {transform:translate(-6px,10px) rotate(-2deg) scale(1.02);}
  75% {transform:translate(8px,6px) rotate(4deg) scale(0.98);}
  100%{transform:translate(-4px,-10px) rotate(-3deg) scale(1.03);}
}

.inner{width:100%;height:100%;position:relative;transform-style:preserve-3d;transition:transform 0.75s cubic-bezier(0.4,0,0.2,1);}
.inner.flip{transform:rotateY(180deg)}

.face{position:absolute;inset:0;border-radius:20px;display:flex;flex-direction:column;align-items:center;justify-content:center;backface-visibility:hidden;-webkit-backface-visibility:hidden;}

/* FRONT */
.front{background:linear-gradient(145deg,var(--card2),#0e0e1a);border:1.5px solid rgba(245,200,66,0.22);box-shadow:0 0 30px rgba(124,58,237,0.15),inset 0 1px 0 rgba(255,255,255,0.05);overflow:hidden;transition:border-color 0.3s,box-shadow 0.3s;}
.front::before{content:'';position:absolute;inset:0;background:repeating-linear-gradient(45deg,transparent,transparent 20px,rgba(245,200,66,0.018) 20px,rgba(245,200,66,0.018) 21px);}
.front::after{content:'';position:absolute;top:-50%;left:-50%;width:200%;height:200%;background:conic-gradient(transparent 0deg,rgba(245,200,66,0.045) 60deg,transparent 120deg);animation:spin 8s linear infinite;}
@keyframes spin{to{transform:rotate(360deg)}}

.box-icon{font-size:48px;position:relative;z-index:1;animation:fl 3s ease-in-out infinite}
@keyframes fl{0%,100%{transform:translateY(0)}50%{transform:translateY(-7px)}}
.box-label{font-size:10px;letter-spacing:3px;color:rgba(245,200,66,0.45);text-transform:uppercase;margin-top:6px;position:relative;z-index:1;}
.box-num{position:absolute;top:10px;right:12px;font-size:10px;font-weight:700;color:rgba(245,200,66,0.3);letter-spacing:1px;z-index:2;}

/* glow on winning box */
.box.is-winning .front{border-color:rgba(245,200,66,0.75);box-shadow:0 0 0 1px rgba(245,200,66,0.3),0 0 40px rgba(245,200,66,0.28),inset 0 1px 0 rgba(255,255,255,0.08);}
.box.is-winning .box-label{color:rgba(245,200,66,0.8);}

/* BACK — winner */
.back{background:linear-gradient(145deg,#1a1025,#0f0f1c);border:1.5px solid rgba(245,200,66,0.55);transform:rotateY(180deg);box-shadow:0 0 50px rgba(245,200,66,0.22);padding:10px;text-align:center;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:6px;}

/* BACK — loser (revealed after pick) */
.back.loser{background:linear-gradient(145deg,#0f0f18,#0a0a12);border-color:rgba(255,255,255,0.12);box-shadow:0 0 20px rgba(0,0,0,0.4);}

.rg{font-size:32px;line-height:1;}
.rp{font-family:'Cinzel Decorative',serif;font-size:12px;font-weight:900;background:linear-gradient(135deg,#f5c842,#fff4a0);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;line-height:1.4;padding:0 4px;}
.rp.loser-txt{background:linear-gradient(135deg,rgba(255,255,255,0.4),rgba(255,255,255,0.2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;font-size:11px;}
.r-badge{font-size:10px;font-weight:700;letter-spacing:2px;text-transform:uppercase;padding:3px 10px;border-radius:20px;}
.r-badge.win{background:rgba(245,200,66,0.18);border:1px solid rgba(245,200,66,0.4);color:var(--gold);}
.r-badge.miss{background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.1);color:rgba(255,255,255,0.3);}

/* ── RESULT ── */
#result{position:relative;z-index:10;text-align:center;margin:6px 20px 30px;min-height:70px;}
.result-inner{display:inline-block;background:linear-gradient(135deg,rgba(245,200,66,0.12),rgba(245,200,66,0.05));border:1px solid rgba(245,200,66,0.45);border-radius:18px;padding:16px 28px;opacity:0;transform:translateY(14px) scale(0.96);transition:all 0.55s cubic-bezier(0.34,1.56,0.64,1);max-width:360px;}
.result-inner.show{opacity:1;transform:translateY(0) scale(1)}
.result-emoji{font-size:28px;}
.result-text{font-family:'Cinzel Decorative',serif;font-size:13px;color:var(--gold);margin-top:6px;line-height:1.5;}
.result-sub{font-size:13px;color:rgba(255,255,255,0.45);margin-top:5px;}

/* ── CONFETTI ── */
.confetti-p{position:fixed;top:-10px;border-radius:2px;animation:cf var(--dur,2.5s) ease-in forwards;z-index:999;pointer-events:none;}
@keyframes cf{0%{transform:translateY(0) rotate(0deg) scale(1);opacity:1}80%{opacity:1}100%{transform:translateY(105vh) rotate(720deg) scale(0.5);opacity:0}}

/* ── EXPIRED ── */
.expired-banner{position:relative;z-index:10;text-align:center;padding:40px 20px;}
.exp-icon{font-size:48px;margin-bottom:12px;}
.exp-text{font-family:'Cinzel Decorative',serif;font-size:15px;color:rgba(255,80,80,0.8);}
.exp-sub{font-size:13px;color:rgba(255,255,255,0.35);margin-top:8px;}
</style>
</head>
<body>

<div class="stars" id="stars"></div>

<header>
  <div class="logo-wrap"><h1>Budget Bazar</h1></div>
  <div class="subtitle">Mystery Reward Box</div>
  <div id="timer"></div>
</header>

<!-- ADMIN PANEL -->
<div id="adminPanel">
  <h3>&#9670; Admin Setup &#9670;</h3>

  <div class="slabel">Box 1 &amp; 2 — Gift set karo</div>
  <div class="box-row">
    <div class="bcfg">
      <div class="bcfg-t">Box 1</div>
      <input type="text" id="g0" placeholder="e.g. T-Shirt + 10 pts">
    </div>
    <div class="bcfg">
      <div class="bcfg-t">Box 2</div>
      <input type="text" id="g1" placeholder="e.g. Chips + 5 pts">
    </div>
  </div>

  <div class="slabel">Box 3 &amp; 4 — Gift set karo</div>
  <div class="box-row">
    <div class="bcfg">
      <div class="bcfg-t">Box 3</div>
      <input type="text" id="g2" placeholder="e.g. 15 Points">
    </div>
    <div class="bcfg">
      <div class="bcfg-t">Box 4</div>
      <input type="text" id="g3" placeholder="e.g. Free Juice">
    </div>
  </div>

  <div class="slabel">Customer konsa box kholega? (Winning box)</div>
  <div class="win-select">
    <button class="wb active" id="wb0" onclick="setWin(0)">Box 1</button>
    <button class="wb" id="wb1" onclick="setWin(1)">Box 2</button>
    <button class="wb" id="wb2" onclick="setWin(2)">Box 3</button>
    <button class="wb" id="wb3" onclick="setWin(3)">Box 4</button>
  </div>

  <button class="gen-btn" onclick="generateLink()">&#10024; Generate Magic Link</button>
  <p id="link"></p>
</div>

<!-- SHUFFLE HINT -->
<div id="shuffleHint"></div>

<!-- BOXES -->
<div class="container" id="boxContainer">
  <div class="box" id="box0" onclick="openBox(0)">
    <div class="inner" id="inner0">
      <div class="face front"><div class="box-num">01</div><div class="box-icon">&#127873;</div><div class="box-label">Tap to Open</div></div>
      <div class="face back" id="back0"></div>
    </div>
  </div>
  <div class="box" id="box1" onclick="openBox(1)">
    <div class="inner" id="inner1">
      <div class="face front"><div class="box-num">02</div><div class="box-icon">&#127873;</div><div class="box-label">Tap to Open</div></div>
      <div class="face back" id="back1"></div>
    </div>
  </div>
  <div class="box" id="box2" onclick="openBox(2)">
    <div class="inner" id="inner2">
      <div class="face front"><div class="box-num">03</div><div class="box-icon">&#127873;</div><div class="box-label">Tap to Open</div></div>
      <div class="face back" id="back2"></div>
    </div>
  </div>
  <div class="box" id="box3" onclick="openBox(3)">
    <div class="inner" id="inner3">
      <div class="face front"><div class="box-num">04</div><div class="box-icon">&#127873;</div><div class="box-label">Tap to Open</div></div>
      <div class="face back" id="back3"></div>
    </div>
  </div>
</div>

<div id="result">
  <div class="result-inner" id="resultInner">
    <div class="result-emoji">&#127881;</div>
    <div class="result-text" id="resultText"></div>
    <div class="result-sub" id="resultSub"></div>
  </div>
</div>

<script>
// ── STARS ──
(function(){
  var s = document.getElementById("stars");
  for(var i = 0; i < 90; i++){
    var el = document.createElement("div"); el.className = "star";
    el.style.left = Math.random()*100+"vw";
    el.style.top  = Math.random()*100+"vh";
    el.style.setProperty("--d", (2+Math.random()*4)+"s");
    el.style.setProperty("--delay", (-Math.random()*4)+"s");
    el.style.setProperty("--op", 0.3+Math.random()*0.7);
    s.appendChild(el);
  }
})();

// ── CONFIG ──
var SEC = "bbz2024";
var EXP = 60000; // 60s
var selWin = 0;

// Box emojis and icons shown on back
var BACK_EMOJIS = ["&#127849;","&#127866;","&#127848;","&#127851;"];
// Loser label shown on un-picked boxes
var LOSER_LABELS = ["Better luck next time!", "Not this one!", "Almost!", "Close one!"];

function setWin(n){
  selWin = n;
  for(var i=0;i<4;i++)
    document.getElementById("wb"+i).className = "wb"+(i===n?" active":"");
}

// ── HEX ENCODE/DECODE ──
function toHex(obj){
  var j=JSON.stringify(obj), enc="";
  for(var i=0;i<j.length;i++) enc+=("00"+j.charCodeAt(i).toString(16)).slice(-4);
  return enc;
}
function fromHex(str){
  try{
    var j="";
    for(var i=0;i<str.length;i+=4) j+=String.fromCharCode(parseInt(str.substr(i,4),16));
    return JSON.parse(j);
  }catch(e){return null;}
}

// ── GENERATE LINK ──
function generateLink(){
  var gifts=[];
  for(var i=0;i<4;i++){
    var g=document.getElementById("g"+i).value.trim();
    if(!g){alert("Box "+(i+1)+" ka gift likho!");return;}
    gifts.push(g);
  }
  var obj={s:SEC,t:Date.now(),w:selWin,gifts:gifts};
  var lnk=location.origin+location.pathname+"?c="+toHex(obj);
  document.getElementById("link").innerHTML =
    '<span style="color:rgba(255,255,255,0.4);">Link ready! Share this:</span><br>'+
    '<span style="color:var(--gold);cursor:pointer;" onclick="navigator.clipboard&&navigator.clipboard.writeText(\''+lnk+'\').then(function(){this.innerText=\'Copied!\';},function(){}).bind(this)">'+lnk+'</span>';
}

// ── READ URL PARAMS ──
var params = new URLSearchParams(location.search);
var rawCode = params.get("c");
var GD = null;

if(rawCode){
  document.getElementById("adminPanel").style.display = "none";
  var parsed = fromHex(rawCode);
  if(parsed && parsed.s === SEC){
    GD = (Date.now() - parsed.t > EXP) ? "expired" : parsed;
  }
}

// ── EXPIRED ──
if(GD === "expired"){
  document.getElementById("boxContainer").style.display = "none";
  document.getElementById("shuffleHint").style.display = "none";
  document.getElementById("result").innerHTML =
    '<div class="expired-banner"><div class="exp-icon">&#8987;</div>'+
    '<div class="exp-text">Offer Expired!</div>'+
    '<div class="exp-sub">Yeh link expire ho gaya hai.<br>Budget Bazar pe visit karo naya reward pao!</div></div>';
}

// ── TIMER ──
if(GD && GD !== "expired"){
  var tel = document.getElementById("timer");
  tel.style.display = "inline-block";
  var endAt = GD.t + EXP;
  var ti = setInterval(function(){
    var left = endAt - Date.now();
    if(left <= 0){tel.innerText = "Offer Expired";tel.className="urgent";clearInterval(ti);return;}
    var sc = Math.ceil(left/1000);
    tel.innerText = "Offer ends in "+sc+"s";
    if(sc <= 10) tel.className = "urgent";
  }, 400);
}

// ── PRE-FILL ALL BOX BACKS (hidden, ready for reveal) ──
// BUG FIX: populate ALL backs upfront so reveal shows correct prizes
if(GD && GD !== "expired"){

  // Fill all 4 backs with their respective gifts
  for(var bi=0; bi<4; bi++){
    var backEl = document.getElementById("back"+bi);
    var isWinner = (bi === GD.w);
    if(isWinner){
      backEl.innerHTML =
        '<div class="rg">'+BACK_EMOJIS[bi]+'</div>'+
        '<div class="rp">'+GD.gifts[bi]+'</div>'+
        '<div class="r-badge win">&#127881; You Won!</div>';
    } else {
      backEl.innerHTML =
        '<div class="rg" style="font-size:26px;opacity:0.45;">'+BACK_EMOJIS[bi]+'</div>'+
        '<div class="rp loser-txt">'+GD.gifts[bi]+'</div>'+
        '<div class="r-badge miss">Not this one</div>';
      backEl.classList.add("loser");
    }
  }

  // Mark winning box as clickable
  document.getElementById("box"+GD.w).classList.add("is-winning");

  // Make non-winning boxes non-clickable
  for(var i=0; i<4; i++){
    if(i !== GD.w){
      document.getElementById("box"+i).classList.add("not-winning");
    }
  }

  // Start shuffle after short delay
  setTimeout(function(){ startShuffle(); }, 700);
}

// ── SHUFFLE ANIMATION ──
// BUG FIX: Use CSS class per box + JS position swap for real shuffle feel
var shuffling = false;
var shufflePhase = 0;
var POSITIONS = [[0,0],[1,0],[0,1],[1,1]]; // grid positions [col,row]
var currentPositions = [0,1,2,3]; // which visual position each box occupies
var shuffleInterval = null;
var tickInterval = null;

function startShuffle(){
  shuffling = true;
  var hint = document.getElementById("shuffleHint");
  hint.innerText = "Boxes shuffle ho rahe hain...";
  hint.style.opacity = "1";

  var boxes = [
    document.getElementById("box0"),
    document.getElementById("box1"),
    document.getElementById("box2"),
    document.getElementById("box3")
  ];
  var cont = document.getElementById("boxContainer");

  // Phase 1: Add CSS wobble to each box with staggered offsets
  boxes.forEach(function(b, i){
    b.style.animationDelay = (i * 0.09) + "s";
    b.classList.add("shuffle-me");
  });

  // Play tick sounds
  tickInterval = setInterval(playTick, 160);

  // Phase 2: Every 0.45s, do a real DOM swap of two random boxes
  var swapCount = 0;
  var maxSwaps = 9;
  shuffleInterval = setInterval(function(){
    // Pick 2 random different indices
    var a = Math.floor(Math.random()*4);
    var b;
    do { b = Math.floor(Math.random()*4); } while(b === a);

    // Swap DOM positions by swapping nodes in container
    var nodeA = document.getElementById("box"+a);
    var nodeB = document.getElementById("box"+b);
    var afterA = nodeA.nextSibling;

    if(afterA === nodeB){
      cont.insertBefore(nodeB, nodeA);
    } else {
      var afterB = nodeB.nextSibling;
      cont.insertBefore(nodeB, nodeA);
      if(afterA){ cont.insertBefore(nodeA, afterA); }
      else { cont.appendChild(nodeA); }
    }

    swapCount++;
    if(swapCount >= maxSwaps){
      clearInterval(shuffleInterval);
      clearInterval(tickInterval);

      // Stop wobble smoothly
      setTimeout(function(){
        boxes.forEach(function(b){ b.classList.remove("shuffle-me"); });
        shuffling = false;
        hint.innerText = "Apna lucky box chuniye! &#9660;";
        hint.style.opacity = "1";
      }, 400);
    }
  }, 450);
}

// ── OPEN BOX ──
var opened = false;
function openBox(idx){
  if(shuffling) return;
  if(!GD || GD === "expired"){ alert("Link expire ho gaya hai!"); return; }
  if(localStorage.getItem("bbz_"+rawCode)){ alert("Yeh reward already use ho chuka hai!"); return; }
  if(opened) return;
  opened = true;
  localStorage.setItem("bbz_"+rawCode, "1");

  var hint = document.getElementById("shuffleHint");
  hint.style.opacity = "0";

  // ── Flip winning box immediately ──
  document.getElementById("inner"+idx).classList.add("flip");
  playWin();

  // ── After 1.4s, reveal ALL remaining boxes one by one ──
  setTimeout(function(){
    var delay = 0;
    for(var i = 0; i < 4; i++){
      if(i !== idx){
        (function(bi, d){
          setTimeout(function(){
            document.getElementById("inner"+bi).classList.add("flip");
          }, d);
        })(i, delay);
        delay += 280;
      }
    }
  }, 1400);

  // ── Show result banner ──
  setTimeout(function(){
    confettiBurst();
    var ri = document.getElementById("resultInner");
    document.getElementById("resultText").innerText = "Aapne jeeta: " + GD.gifts[GD.w];
    document.getElementById("resultSub").innerText = "Budget Bazar pe aake claim karo!";
    ri.classList.add("show");
  }, 800);
}

// ── CONFETTI ──
function confettiBurst(){
  var clr=["#f5c842","#7c3aed","#ff6b6b","#4ecdc4","#fff4a0","#ff9f43","#a29bfe","#55efc4"];
  for(var i=0;i<80;i++){
    var el=document.createElement("div"); el.className="confetti-p";
    el.style.left=Math.random()*100+"vw";
    el.style.background=clr[Math.floor(Math.random()*clr.length)];
    el.style.setProperty("--dur",(1.8+Math.random()*2)+"s");
    el.style.width=(4+Math.random()*9)+"px";
    el.style.height=(4+Math.random()*9)+"px";
    el.style.borderRadius=Math.random()>0.5?"50%":"3px";
    document.body.appendChild(el);
    setTimeout(function(e){e.remove();},4000,el);
  }
}

// ── AUDIO ──
var actx=null;
function getCtx(){if(!actx)actx=new(window.AudioContext||window.webkitAudioContext)();return actx;}
function playTick(){
  try{
    var c=getCtx(),o=c.createOscillator(),g=c.createGain();
    o.connect(g);g.connect(c.destination);o.type="sine";
    o.frequency.value=500+Math.random()*600;
    g.gain.setValueAtTime(0.06,c.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001,c.currentTime+0.06);
    o.start(c.currentTime);o.stop(c.currentTime+0.06);
  }catch(e){}
}
function playWin(){
  try{
    var c=getCtx();
    [523,659,784,1047,1319,1568].forEach(function(f,i){
      var o=c.createOscillator(),g=c.createGain();
      o.connect(g);g.connect(c.destination);
      o.type="triangle";o.frequency.value=f;
      var t=c.currentTime+i*0.09;
      g.gain.setValueAtTime(0,t);
      g.gain.linearRampToValueAtTime(0.14,t+0.04);
      g.gain.exponentialRampToValueAtTime(0.001,t+0.35);
      o.start(t);o.stop(t+0.4);
    });
  }catch(e){}
}
