<!DOCTYPE html><html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Budget Bazar Mystery Boxes</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@600;800&display=swap" rel="stylesheet">
<style>
body{font-family:'Poppins',sans-serif;text-align:center;margin:0;background:#ff1e1e;color:#fff}
h1{margin-top:15px;font-size:36px;font-weight:800}
#timer{font-size:18px;margin-top:5px}
.container{display:grid;grid-template-columns:repeat(2,1fr);gap:20px;padding:20px;max-width:500px;margin:auto}
.box{width:100%;height:150px;background:#fff;color:#333;border-radius:16px;display:flex;align-items:center;justify-content:center;font-size:22px;font-weight:bold;cursor:pointer;transition:.6s;perspective:1000px}
.inner{width:100%;height:100%;display:flex;align-items:center;justify-content:center;transition:transform .6s;transform-style:preserve-3d}
.flip{transform:rotateY(180deg)}
.hidden{background:#ff4b2b;color:#fff}
#result{margin-top:15px;font-size:22px;font-weight:bold}
.confetti{position:fixed;width:10px;height:10px;background:yellow;top:0;animation:fall 2s linear forwards}
@keyframes fall{to{transform:translateY(100vh);opacity:0}}
</style>
</head>
<body>
<h1>🔥 Budget Bazar 🔥</h1>
<div id="timer"></div><div id="adminPanel">
<input type="number" id="setPoints" placeholder="Set Base Points (1-20)">
<button onclick="generateLink()">Generate Link</button>
<p id="link"></p>
</div><div class="container" id="boxContainer">
<div class="box" onclick="openBox(0)"><div class="inner"></div></div>
<div class="box" onclick="openBox(1)"><div class="inner"></div></div>
<div class="box" onclick="openBox(2)"><div class="inner"></div></div>
<div class="box" onclick="openBox(3)"><div class="inner"></div></div>
</div><div id="result"></div>
<audio id="shuffleSound" src="https://www.soundjay.com/button/beep-07.wav"></audio><script>
const SECRET="bbz@pro";
const EXPIRY_TIME=1*60*1000;

function encode(p){return btoa(p+"-"+SECRET+"-"+Date.now()).replace(/=/g,"")}
function decode(c){try{let d=atob(c).split("-");if(d[1]===SECRET){if(Date.now()-d[2]>EXPIRY_TIME)return"expired";return parseInt(d[0])}}catch{}return null}

function generateLink(){
 let p=parseInt(document.getElementById("setPoints").value);
 let code=encode(p);
 document.getElementById("link").innerText=location.origin+location.pathname+"?code="+code;
}

let url=new URLSearchParams(location.search);
let code=url.get("code");
let base=decode(code);
if(code)document.getElementById("adminPanel").style.display="none";

let boxes=document.querySelectorAll(".box");
let inners=document.querySelectorAll(".inner");
let container=document.getElementById("boxContainer");
let sound=document.getElementById("shuffleSound");

// countdown
if(base){
 let end=Date.now()+EXPIRY_TIME;
 let t=setInterval(()=>{
  let left=end-Date.now();
  if(left<=0){document.getElementById("timer").innerText="Expired";clearInterval(t);return}
  document.getElementById("timer").innerText="⏳ Offer ends in "+Math.floor(left/1000)+"s";
 },500);
}

// fake values
if(base){
 let vals=[base,base-2,base-3,base+5].map(v=>v<1?1:v>20?20:v);
 inners.forEach((el,i)=>el.innerText=vals[i]);
 setTimeout(()=>{
  inners.forEach(el=>el.innerText="🎁");
  shuffle();
 },1500);
}

function shuffle(){
 sound.play();
 let t=Date.now();
 function move(){
  let p=Date.now()-t;
  boxes.forEach((b,i)=>{
    let x=Math.sin(p/200+i)*20;
    let y=Math.cos(p/200+i)*20;
    b.style.transform=`translate(${x}px,${y}px)`;
  });
  if(p<3000)requestAnimationFrame(move);
  else boxes.forEach(b=>b.style.transform="");
 }
 move();
}

function confetti(){
 for(let i=0;i<30;i++){
  let d=document.createElement("div");
  d.className="confetti";
  d.style.left=Math.random()*100+"vw";
  d.style.background=`hsl(${Math.random()*360},100%,50%)`;
  document.body.appendChild(d);
  setTimeout(()=>d.remove(),2000);
 }
}

function openBox(i){
 if(!base||base=="expired")return alert("Link expired");
 if(localStorage.getItem("used_"+code))return alert("Already used");

 inners[i].classList.add("flip");
 inners[i].innerText=base;
 document.getElementById("result").innerText="🎉 You got "+base+" points!";
 confetti();
 localStorage.setItem("used_"+code,true);
}
</script></body>
</html>
