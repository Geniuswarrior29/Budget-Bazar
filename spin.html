<!DOCTYPE html><html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Spin & Win Pro</title>
<style>
    body {
        font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        text-align: center;
        margin: 0;
        background: radial-gradient(circle at top, #667eea, #764ba2);
        color: #fff;
    }
    h1 { margin-top: 20px; }.container {
    max-width: 400px;
    margin: auto;
}

.wheel-container {
    position: relative;
    width: 300px;
    height: 300px;
    margin: 30px auto;
}

.wheel {
    width: 100%;
    height: 100%;
    border-radius: 50%;
    border: 8px solid white;
    position: relative;
    transition: transform 4s cubic-bezier(.17,.67,.83,.67);
    overflow: hidden;
}

.slice {
    position: absolute;
    width: 50%;
    height: 50%;
    top: 50%;
    left: 50%;
    transform-origin: 0% 0%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 14px;
    font-weight: bold;
    color: #fff;
}

.pointer {
    position: absolute;
    top: -20px;
    left: 50%;
    transform: translateX(-50%);
    width: 0;
    height: 0;
    border-left: 15px solid transparent;
    border-right: 15px solid transparent;
    border-bottom: 25px solid #fff;
    z-index: 10;
}

button {
    padding: 12px 25px;
    font-size: 18px;
    background: linear-gradient(45deg,#ff416c,#ff4b2b);
    border: none;
    border-radius: 10px;
    color: white;
    cursor: pointer;
    margin-top: 10px;
}

input {
    padding: 10px;
    border-radius: 8px;
    border: none;
    margin: 5px;
    width: 150px;
}

#adminPanel {
    background: rgba(255,255,255,0.1);
    padding: 15px;
    border-radius: 10px;
    margin-top: 20px;
}

</style>
</head>
<body><div class="container">
<h1>🎡 Spin & Win</h1><div id="adminPanel">
    <h3>Admin Control</h3>
    <input type="number" id="setPoints" min="1" max="20" placeholder="Set Points (1-20)">
    <button onclick="generateLink()">Generate Link</button>
    <p id="link"></p>
</div><div class="wheel-container">
    <div class="pointer"></div>
    <div class="wheel" id="wheel"></div>
</div><button onclick="spinWheel()">SPIN</button>

<h2 id="result"></h2>
</div><script>
const wheel = document.getElementById("wheel");
const total = 20;

// create slices with numbers
for (let i = 1; i <= total; i++) {
    let slice = document.createElement("div");
    slice.className = "slice";
    let angle = (360 / total) * i;
    slice.style.transform = `rotate(${angle}deg) skewY(${90 - 360/total}deg)`;
    slice.style.background = `hsl(${i*18}, 80%, 55%)`;

    let span = document.createElement("span");
    span.style.transform = `skewY(-${90 - 360/total}deg) rotate(-${angle}deg)`;
    span.innerText = i;
    slice.appendChild(span);

    wheel.appendChild(slice);
}

let urlParams = new URLSearchParams(window.location.search);
let fixedPoint = urlParams.get("points");
let used = localStorage.getItem("usedSpin_" + fixedPoint);

if (fixedPoint) {
    document.getElementById("adminPanel").style.display = "none";
}

function generateLink() {
    let points = document.getElementById("setPoints").value;
    if (points < 1 || points > 20) {
        alert("Enter between 1-20");
        return;
    }
    let link = window.location.origin + window.location.pathname + "?points=" + points;
    document.getElementById("link").innerText = link;
}

function spinWheel() {
    if (used && fixedPoint) {
        alert("Already used!");
        return;
    }

    let result = fixedPoint ? parseInt(fixedPoint) : Math.floor(Math.random() * 20) + 1;
    let degree = 3600 + (360/20)*(20-result);

    wheel.style.transform = `rotate(${degree}deg)`;

    setTimeout(() => {
        document.getElementById("result").innerText = `You got ${result} points!`;
        if (fixedPoint) {
            localStorage.setItem("usedSpin_" + fixedPoint, true);
        }
    }, 4000);
}
</script></body>
</html>
