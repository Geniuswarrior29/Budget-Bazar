<!DOCTYPE html><html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Budget Bazar Mystery Boxes</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@600;800&display=swap" rel="stylesheet">
<style>
body{font-family:'Poppins',sans-serif;text-align:center;margin:0;background:#ff1e1e;color:#fff}
h1{margin-top:15px;font-size:36px;font-weight:800}
#timer{font-size:18px;margin-top:5px}
.container{display:grid;grid-template-columns:repeat(2,1fr);gap:20px;padding:20px;max-width:500px;margin:auto}
.box{width:100%;height:150px;background:#fff;color:#333;border-radius:16px;display:flex;align-items:center;justify-content:center;font-size:20px;font-weight:bold;cursor:pointer;transition:.6s}
.hidden{background:#ff4b2b;color:#fff}
#result{margin-top:15px;font-size:22px;font-weight:bold}
input{padding:8px;margin:5px;border-radius:6px;border:none}
button{padding:8px 15px;border:none;border-radius:6px;background:#000;color:#fff}
</style>
</head>
<body>
<h1>🔥 Budget Bazar 🔥</h1>
<div id="timer"></div><div id="adminPanel">
<input id="p1" placeholder="Box 1 Prize">
<input id="p2" placeholder="Box 2 Prize"><br>
<input id="p3" placeholder="Box 3 Prize">
<input id="p4" placeholder="Box 4 Prize"><br>
<input type="number" id="winBox" placeholder="Winning Box (1-4)">
<button onclick="generateLink()">Generate Link</button>
<p id="link"></p>
</div><div class="container">
<div class="box" onclick="openBox(0)"></div>
<div class="box" onclick="openBox(1)"></div>
<div class="box" onclick="openBox(2)"></div>
<div class="box" onclick="openBox(3)"></div>
</div><div id="result"></div><script>
const SECRET="bbz@pro";
const EXPIRY=60000;

function encode(data){return btoa(JSON.stringify(data)+SECRET)}
function decode(c){try{return JSON.parse(atob(c).replace(SECRET,""))}catch{return null}}

function generateLink(){
 let data={
  prizes:[
    document.getElementById("p1").value,
    document.getElementById("p2").value,
    document.getElementById("p3").value,
    document.getElementById("p4").value
  ],
  win:parseInt(document.getElementById("winBox").value)-1,
  time:Date.now()
 };
 let code=encode(data);
 document.getElementById("link").innerText=location.origin+location.pathname+"?code="+code;
}

let url=new URLSearchParams(location.search);
let code=url.get("code");
let data=decode(code);

if(code)document.getElementById("adminPanel").style.display="none";

let boxes=document.querySelectorAll(".box");

if(data){
 if(Date.now()-data.time>EXPIRY){alert("Link expired");data=null}
 else{
  boxes.forEach((b,i)=>b.innerText=data.prizes[i]);
  setTimeout(()=>{
    boxes.forEach(b=>b.innerText="🎁");
  },1500);
 }
}

function openBox(i){
 if(!data)return alert("Invalid/Expired");
 if(localStorage.getItem("used_"+code))return alert("Already used");

 let prize=data.prizes[data.win];
 document.getElementById("result").innerText="🎉 You got: "+prize;
 boxes[i].innerText=prize;
 boxes[i].style.background="#00c853";
 boxes[i].style.color="#fff";

 localStorage.setItem("used_"+code,true);
}
</script></body>
</html>
