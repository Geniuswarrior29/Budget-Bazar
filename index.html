<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Budget Bazar \u2014 Raebareli</title>
<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@400;600;700;800;900&family=Hind:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --red: #d4000c;
  --orange: #ff6b00;
  --yellow: #ffcc00;
  --dark: #1a0505;
  --white: #fff;
  --light: #fff9f0;
  --green: #0a7c3e;
}
* { margin:0; padding:0; box-sizing:border-box; scroll-behavior:smooth; }
body { font-family:'Hind',sans-serif; background:var(--light); color:var(--dark); overflow-x:hidden; }

/* NAV */
nav { position:fixed; top:0; left:0; right:0; z-index:999; background:rgba(26,5,5,0.97); backdrop-filter:blur(10px); display:flex; align-items:center; justify-content:space-between; padding:0 5%; height:60px; box-shadow:0 2px 20px rgba(0,0,0,0.4); }
.nav-logo { font-family:'Baloo 2',cursive; font-size:22px; font-weight:900; color:var(--yellow); }
.nav-logo span { color:var(--orange); }
.nav-links { display:flex; gap:18px; list-style:none; }
.nav-links a { text-decoration:none; color:rgba(255,255,255,0.8); font-size:13px; font-weight:600; transition:color 0.2s; }
.nav-links a:hover { color:var(--yellow); }
.nav-cart { background:var(--red); color:white; border:none; padding:8px 16px; border-radius:30px; font-size:13px; font-weight:700; cursor:pointer; font-family:'Hind',sans-serif; position:relative; }
.cart-count { position:absolute; top:-6px; right:-6px; background:var(--yellow); color:var(--dark); width:18px; height:18px; border-radius:50%; font-size:10px; font-weight:900; display:flex; align-items:center; justify-content:center; }
@media(max-width:600px){ .nav-links{display:none;} }

/* HERO */
.hero { min-height:100vh; background:linear-gradient(135deg,#1a0505,#3d0a0a,#6b1a00,#1a0505); display:flex; flex-direction:column; align-items:center; justify-content:center; text-align:center; padding:90px 20px 60px; position:relative; overflow:hidden; }
.c { position:absolute; border-radius:50%; opacity:0.07; animation:floatUp 8s ease-in-out infinite; }
.c1{width:380px;height:380px;background:var(--orange);top:-100px;left:-100px;}
.c2{width:280px;height:280px;background:var(--yellow);bottom:-80px;right:-80px;animation-delay:2s;}
.c3{width:180px;height:180px;background:var(--red);top:40%;left:62%;animation-delay:4s;}
@keyframes floatUp{0%,100%{transform:translateY(0)}50%{transform:translateY(-28px)}}
.hero-badge { display:inline-block; background:rgba(255,204,0,0.15); border:1.5px solid rgba(255,204,0,0.4); color:var(--yellow); font-size:11px; font-weight:700; padding:5px 18px; border-radius:30px; letter-spacing:3px; text-transform:uppercase; margin-bottom:18px; animation:fadeDown 0.7s ease backwards; }
.hero-title { font-family:'Baloo 2',cursive; font-size:clamp(56px,11vw,100px); font-weight:900; color:white; line-height:0.9; letter-spacing:-3px; animation:fadeDown 0.7s ease 0.1s backwards; }
.hero-title .hl { color:var(--yellow); display:block; }
.hero-tagline { font-size:16px; font-weight:600; color:rgba(255,255,255,0.75); margin:16px 0 10px; animation:fadeDown 0.7s ease 0.2s backwards; }
.hero-tagline span{color:var(--orange);}
.notice-box { background:rgba(255,204,0,0.15); border:1.5px solid rgba(255,204,0,0.5); border-radius:12px; padding:10px 20px; margin:10px 0 24px; max-width:560px; font-size:13px; color:rgba(255,255,255,0.9); line-height:1.5; animation:fadeDown 0.7s ease 0.25s backwards; }
.notice-box strong{color:var(--yellow);}
.hero-btns { display:flex; gap:12px; flex-wrap:wrap; justify-content:center; animation:fadeDown 0.7s ease 0.3s backwards; }
.btn-p { background:linear-gradient(135deg,var(--red),var(--orange)); color:white; text-decoration:none; padding:13px 28px; border-radius:50px; font-size:14px; font-weight:700; box-shadow:0 8px 25px rgba(212,0,12,0.4); transition:transform 0.2s; display:inline-block; border:none; cursor:pointer; font-family:'Hind',sans-serif; }
.btn-p:hover{transform:translateY(-2px);}
.btn-s { background:rgba(255,255,255,0.1); border:2px solid rgba(255,255,255,0.3); color:white; text-decoration:none; padding:13px 28px; border-radius:50px; font-size:14px; font-weight:700; transition:all 0.2s; display:inline-block; }
.btn-s:hover{border-color:var(--yellow);color:var(--yellow);}
.scroll-ind{position:absolute;bottom:24px;left:50%;transform:translateX(-50%);color:rgba(255,255,255,0.35);font-size:20px;animation:bounce 2s infinite;}
@keyframes bounce{0%,100%{transform:translateX(-50%) translateY(0)}50%{transform:translateX(-50%) translateY(8px)}}
@keyframes fadeDown{from{opacity:0;transform:translateY(-18px)}to{opacity:1;transform:translateY(0)}}

/* POINTS BANNER */
.points-banner { background:linear-gradient(135deg,var(--green),#0d9e50); color:white; padding:20px 5%; text-align:center; }
.points-banner h3 { font-family:'Baloo 2',cursive; font-size:22px; font-weight:900; margin-bottom:6px; }
.points-grid { display:flex; gap:20px; justify-content:center; flex-wrap:wrap; margin-top:12px; }
.point-item { background:rgba(255,255,255,0.15); border-radius:12px; padding:10px 20px; font-size:13px; font-weight:600; }
.point-item strong{color:var(--yellow);}

/* SECTIONS */
section{padding:60px 5%;}
.sec-label{display:inline-block;background:var(--red);color:white;font-size:10px;font-weight:700;padding:4px 14px;border-radius:20px;letter-spacing:3px;text-transform:uppercase;margin-bottom:8px;}
.sec-heading{font-family:'Baloo 2',cursive;font-size:clamp(24px,4vw,38px);font-weight:900;color:var(--dark);line-height:1.1;margin-bottom:6px;}
.sec-heading .ac{color:var(--red);}
.sec-sub{font-size:14px;color:#666;max-width:500px;line-height:1.6;margin-bottom:30px;}

/* NOTICE FOR UNLISTED ITEMS */
.unlisted-notice { background:linear-gradient(135deg,#fff3cd,#ffe69c); border:2px solid var(--yellow); border-radius:16px; padding:16px 20px; margin-bottom:30px; max-width:700px; display:flex; align-items:center; gap:14px; }
.unlisted-notice .icon{font-size:28px;flex-shrink:0;}
.unlisted-notice p{font-size:13px;color:#5a3e00;line-height:1.6;font-weight:600;}
.unlisted-notice a{color:var(--red);text-decoration:none;font-weight:700;}

/* CATEGORIES TABS */
.cat-tabs { display:flex; gap:10px; flex-wrap:wrap; margin-bottom:24px; }
.cat-tab { background:white; border:2px solid #e0d0c0; border-radius:30px; padding:8px 18px; font-size:13px; font-weight:700; cursor:pointer; transition:all 0.2s; font-family:'Hind',sans-serif; color:var(--dark); }
.cat-tab.active,.cat-tab:hover { background:var(--red); border-color:var(--red); color:white; }

/* PRODUCTS GRID */
.products-section{background:white;}
.products-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(160px,1fr)); gap:14px; max-width:1000px; }
.prod-card { background:var(--light); border:2px solid transparent; border-radius:16px; padding:16px 12px; text-align:center; transition:all 0.2s; position:relative; }
.prod-card:hover{border-color:var(--orange);transform:translateY(-3px);background:#fff3e0;}
.prod-emoji{font-size:32px;display:block;margin-bottom:8px;}
.prod-name{font-size:13px;font-weight:700;color:var(--dark);margin-bottom:2px;line-height:1.3;}
.prod-detail{font-size:11px;color:#999;margin-bottom:8px;}
.prod-price{font-family:'Baloo 2',cursive;font-size:18px;font-weight:900;color:var(--red);margin-bottom:10px;}
.prod-price.ask{font-size:12px;color:var(--orange);font-family:'Hind',sans-serif;font-weight:700;}
.add-btn { background:var(--red); color:white; border:none; border-radius:20px; padding:6px 16px; font-size:12px; font-weight:700; cursor:pointer; font-family:'Hind',sans-serif; transition:background 0.2s; width:100%; }
.add-btn:hover{background:var(--orange);}
.add-btn.ask-btn{background:var(--green);}
.qty-control{display:none;align-items:center;justify-content:center;gap:8px;}
.qty-control.show{display:flex;}
.qty-btn{background:var(--red);color:white;border:none;width:26px;height:26px;border-radius:50%;font-size:16px;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center;}
.qty-num{font-family:'Baloo 2',cursive;font-size:16px;font-weight:900;min-width:20px;text-align:center;}

/* CART SIDEBAR */
.cart-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.5);z-index:1000;display:none;}
.cart-overlay.open{display:block;}
.cart-sidebar{position:fixed;right:0;top:0;bottom:0;width:340px;max-width:95vw;background:white;z-index:1001;display:flex;flex-direction:column;box-shadow:-8px 0 40px rgba(0,0,0,0.2);transform:translateX(100%);transition:transform 0.3s ease;}
.cart-sidebar.open{transform:translateX(0);}
.cart-header{background:var(--dark);color:white;padding:18px 20px;display:flex;align-items:center;justify-content:space-between;}
.cart-header h3{font-family:'Baloo 2',cursive;font-size:20px;font-weight:900;color:var(--yellow);}
.cart-close{background:none;border:none;color:white;font-size:24px;cursor:pointer;}
.cart-body{flex:1;overflow-y:auto;padding:16px;}
.cart-empty{text-align:center;padding:40px 20px;color:#aaa;}
.cart-empty .ce-icon{font-size:48px;display:block;margin-bottom:12px;}
.cart-item{display:flex;align-items:center;gap:12px;padding:12px 0;border-bottom:1px solid #f0e8d8;}
.ci-info{flex:1;}
.ci-name{font-size:13px;font-weight:700;color:var(--dark);}
.ci-detail{font-size:11px;color:#aaa;}
.ci-price{font-family:'Baloo 2',cursive;font-size:15px;font-weight:900;color:var(--red);}
.ci-qty{display:flex;align-items:center;gap:6px;margin-top:4px;}
.ci-qbtn{background:var(--light);border:1px solid #ddd;width:22px;height:22px;border-radius:50%;font-size:14px;cursor:pointer;display:flex;align-items:center;justify-content:center;font-weight:700;}
.ci-qnum{font-size:13px;font-weight:700;min-width:16px;text-align:center;}
.ci-remove{background:none;border:none;color:#ccc;font-size:18px;cursor:pointer;padding:4px;}
.ci-remove:hover{color:var(--red);}
.cart-footer{padding:16px 20px;border-top:2px solid #f0e8d8;background:#fafafa;}
.cart-summary{margin-bottom:14px;}
.cart-row{display:flex;justify-content:space-between;font-size:13px;margin-bottom:6px;color:#666;}
.cart-row.total{font-size:16px;font-weight:700;color:var(--dark);}
.cart-row.points{color:var(--green);font-weight:700;}
.wa-order-btn{width:100%;background:linear-gradient(135deg,#25d366,#128c52);color:white;border:none;border-radius:14px;padding:14px;font-size:15px;font-weight:700;cursor:pointer;font-family:'Hind',sans-serif;display:flex;align-items:center;justify-content:center;gap:8px;transition:transform 0.2s;}
.wa-order-btn:hover{transform:translateY(-2px);}

/* WHY US */
.why-section{background:var(--light);}
.why-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(190px,1fr));gap:18px;max-width:860px;}
.why-card{background:white;border-radius:16px;padding:24px 18px;border-bottom:4px solid var(--orange);box-shadow:0 4px 18px rgba(0,0,0,0.06);transition:transform 0.2s;}
.why-card:hover{transform:translateY(-4px);}
.why-icon{font-size:32px;margin-bottom:10px;}
.why-title{font-size:15px;font-weight:700;color:var(--dark);margin-bottom:4px;}
.why-desc{font-size:12px;color:#777;line-height:1.6;}

/* CONTACT */
.contact-section{background:white;}
.contact-inner{display:grid;grid-template-columns:1fr 1fr;gap:50px;align-items:start;max-width:860px;}
@media(max-width:700px){.contact-inner{grid-template-columns:1fr;gap:28px;}}
.contact-cards{display:flex;flex-direction:column;gap:12px;}
.cc{display:flex;align-items:center;gap:16px;background:var(--light);border-radius:14px;padding:16px 18px;text-decoration:none;color:var(--dark);border:2px solid transparent;transition:all 0.2s;}
.cc:hover{border-color:var(--orange);transform:translateX(4px);}
.cc-icon{width:46px;height:46px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0;}
.cc-ph .cc-icon{background:#fff0e0;} .cc-em .cc-icon{background:#e8f4ff;} .cc-ad .cc-icon{background:#fff0f0;}
.cc-lbl{font-size:10px;font-weight:700;color:#bbb;letter-spacing:1px;text-transform:uppercase;}
.cc-val{font-size:14px;font-weight:700;margin-top:2px;}
.map-box{border-radius:18px;overflow:hidden;box-shadow:0 8px 28px rgba(0,0,0,0.12);border:3px solid var(--orange);height:300px;}
.map-box iframe{width:100%;height:100%;border:none;display:block;}

/* FOOTER */
footer{background:var(--dark);color:white;text-align:center;padding:36px 5%;}
.f-logo{font-family:'Baloo 2',cursive;font-size:32px;font-weight:900;color:var(--yellow);margin-bottom:4px;}
.f-logo span{color:var(--orange);}
.f-tag{font-size:13px;color:rgba(255,255,255,0.45);margin-bottom:18px;}
.f-links{display:flex;gap:20px;justify-content:center;flex-wrap:wrap;margin-bottom:18px;}
.f-links a{color:rgba(255,255,255,0.55);text-decoration:none;font-size:13px;font-weight:600;transition:color 0.2s;}
.f-links a:hover{color:var(--yellow);}
.f-div{width:50px;height:2px;background:var(--red);margin:0 auto 14px;border-radius:2px;}
.f-copy{font-size:11px;color:rgba(255,255,255,0.25);}

/* WA FLOAT */
.wa{position:fixed;bottom:22px;right:22px;z-index:998;width:56px;height:56px;background:#25d366;border-radius:50%;display:flex;align-items:center;justify-content:center;box-shadow:0 6px 22px rgba(37,211,102,0.5);text-decoration:none;font-size:26px;animation:wapulse 2.5s infinite;}
@keyframes wapulse{0%,100%{box-shadow:0 6px 22px rgba(37,211,102,0.5)}50%{box-shadow:0 6px 34px rgba(37,211,102,0.85)}}

.reveal{opacity:0;transform:translateY(28px);transition:opacity 0.6s ease,transform 0.6s ease;}
.reveal.visible{opacity:1;transform:translateY(0);}
</style>
</head>
